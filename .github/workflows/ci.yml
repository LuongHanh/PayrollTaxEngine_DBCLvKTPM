name: Payroll Tax Engine AI-Driven CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  automated-build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Pull mã nguồn và lịch sử Git về máy chủ CI
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Quan trọng: Giúp AI phân tích Git-Diff giữa các commit

    - name: 2. Thiết lập môi trường Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Cài đặt các thư viện và Tác nhân AI phụ trợ
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html pytest-testmon

    - name: 4. Khôi phục/Lưu trữ Bộ nhớ Cache cho Tác nhân AI (.testmondata)
      uses: actions/cache@v4
      with:
        path: .testmondata
        key: ${{ runner.os }}-testmon-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-testmon-

    - name: 5. Thực thi Lựa chọn ca kiểm thử hồi quy tự động (AI-Driven RTS)
      run: |
        pytest --testmon --html=report.html --self-contained-html