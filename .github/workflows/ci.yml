name: Payroll Tax Engine CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  automated-build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Pull ma nguon tu GitHub ve may chu CI
      uses: actions/checkout@v4

    - name: 2. Thiet lap moi truong Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Cai dat cac thu vien phu thuoc (Dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html

    - name: 4. Thuc thi tap lenh kiem thu tu dong va Xuat bao cao HTML
      run: |
        pytest -v --html=report.html --self-contained-html